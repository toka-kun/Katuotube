{% extends "base.html" %}

{% block content %}
<style>
    /* 全体コンテナ */
    .dl-container {
        max-width: 900px;
        margin: 0 auto;
        padding: 30px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        text-align: center;
        animation: fadeIn 0.6s ease-out;
    }
    [data-theme="dark"] .dl-container {
        background: #1e1e1e;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .download-header {
        border-bottom: 2px solid var(--main);
        margin-bottom: 25px;
        padding-bottom: 10px;
    }

    /* 入力セクション */
    .input-box {
        display: flex;
        gap: 10px;
        margin-bottom: 30px;
    }
    .input-box input {
        flex: 1;
        padding: 15px;
        border: 2px solid #ddd;
        border-radius: 12px;
        outline: none;
        font-size: 1rem;
        transition: border-color 0.3s;
    }
    [data-theme="dark"] .input-box input {
        background: #2a2a2a;
        border-color: #444;
        color: white;
    }
    .input-box input:focus {
        border-color: var(--main);
    }

    .btn-analyze {
        padding: 0 30px;
        background: var(--main);
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: bold;
        font-size: 1rem;
        transition: transform 0.2s, background 0.2s;
    }
    .btn-analyze:hover {
        background: #005fa3;
        transform: scale(1.02);
    }

    /* ローディングアニメーション */
    .loader {
        display: none;
        width: 50px;
        height: 50px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid var(--main);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 30px auto;
    }

    /* 結果表示エリア */
    #result-area {
        display: none;
        margin-top: 30px;
        text-align: left;
    }

    .video-card {
        display: flex;
        gap: 20px;
        margin-bottom: 30px;
        padding: 20px;
        background: rgba(0,0,0,0.02);
        border-radius: 15px;
        animation: slideUp 0.5s ease-out;
    }
    [data-theme="dark"] .video-card {
        background: rgba(255,255,255,0.05);
    }
    .video-card img {
        width: 240px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .video-info h2 {
        margin: 0;
        font-size: 1.3rem;
        line-height: 1.4;
    }

    /* フォーマットリストのグリッド */
    .format-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 15px;
    }
    .format-item {
        background: #f8f8f8;
        padding: 15px;
        border-radius: 12px;
        border: 1px solid #eee;
        text-decoration: none;
        color: inherit;
        display: flex;
        flex-direction: column;
        transition: all 0.3s ease;
        animation: scaleIn 0.4s ease-out both;
    }
    [data-theme="dark"] .format-item {
        background: #2a2a2a;
        border-color: #444;
    }
    .format-item:hover {
        background: var(--main);
        color: white !important;
        transform: translateY(-5px);
        box-shadow: 0 5px 15px rgba(0,119,190,0.3);
    }
    .format-res {
        font-weight: bold;
        font-size: 1.1rem;
        margin-bottom: 5px;
    }
    .format-ext {
        font-size: 0.85rem;
        opacity: 0.8;
    }

    /* アニメーション定義 */
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

    @media (max-width: 600px) {
        .video-card { flex-direction: column; align-items: center; text-align: center; }
        .video-card img { width: 100%; }
        .input-box { flex-direction: column; }
    }
</style>

<div class="dl-container">
    <div class="download-header">
        <h2><i class="fas fa-file-download"></i> 高機能ダウンローダー</h2>
        <p>URLを貼り付けて、お好みの形式で保存してください。</p>
    </div>

    <div class="input-box">
        <input type="text" id="video-url" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off">
        <button class="btn-analyze" onclick="fetchVideoInfo()">解析開始</button>
    </div>

    <div class="loader" id="loader"></div>

    <div id="result-area">
        <div class="video-card">
            <img id="v-thumb" src="" alt="Thumbnail">
            <div class="video-info">
                <h2 id="v-title"></h2>
                <p id="v-duration" style="margin-top:10px; opacity:0.7;"></p>
            </div>
        </div>
        <div class="format-grid" id="format-list"></div>
    </div>
</div>

<script>
async function fetchVideoInfo() {
    const url = document.getElementById('video-url').value;
    if (!url) {
        alert("URLを入力してください");
        return;
    }

    const loader = document.getElementById('loader');
    const resultArea = document.getElementById('result-area');
    const formatList = document.getElementById('format-list');

    // 状態をリセット
    loader.style.display = 'block';
    resultArea.style.display = 'none';
    formatList.innerHTML = '';

    try {
        const response = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: url })
        });
        
        const data = await response.json();

        if (data.error) throw new Error(data.error);

        // 基本情報をセット
        document.getElementById('v-title').innerText = data.title;
        document.getElementById('v-thumb').src = data.thumbnail;
        
        const minutes = Math.floor(data.duration / 60);
        const seconds = data.duration % 60;
        document.getElementById('v-duration').innerText = `動画時間: ${minutes}分${seconds}秒`;

        // フォーマットボタンを生成
        formatList.innerHTML = data.formats.map((f, index) => `
            <a href="${f.url}" class="format-item" target="_blank" download style="animation-delay: ${index * 0.03}s">
                <span class="format-res">${f.type}: ${f.resolution}</span>
                <span class="format-ext">${f.ext.toUpperCase()} - ${f.size}</span>
            </a>
        `).join('');

        resultArea.style.display = 'block';
    } catch (e) {
        alert("エラーが発生しました: " + e.message);
    } finally {
        loader.style.display = 'none';
    }
}
</script>
{% endblock %}
