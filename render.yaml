services:
  - type: web
    name: katuotube
    runtime: docker # Dockerfileを使う場合は 'docker' と指定
    plan: free
    # Dockerfileを使う場合、build/startCommandは通常Dockerfile内で定義するため不要です
    # もしDockerfileを使わずPythonランタイムを使うなら runtime: python にします
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: FLASK_ENV
        value: production
      - key: RENDER
        value: "True"
      - key: APP_PASSWORD
        sync: false # 手動でRenderのダッシュボードから入力が必要
      - key: SESSION_SECRET
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
